name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            generator: "Visual Studio 17 2022"
            arch_flag: "-A x64"
          - os: macos-latest
            generator: "Xcode"
            arch_flag: ""
          - os: ubuntu-latest
            generator: "Ninja"
            arch_flag: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ninja-build pkg-config \
            libasound2-dev libjack-jackd2-dev libcurl4-openssl-dev \
            libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev

      - name: Configure
        run: cmake -B build -G "${{ matrix.generator }}" ${{ matrix.arch_flag }} -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staging
          if [ -d "build/MuCalc_artefacts/Release/VST3" ]; then
            cp -R "build/MuCalc_artefacts/Release/VST3" staging/
          fi
          if [ -d "build/MuCalc_artefacts/Release/CLAP" ]; then
            cp -R "build/MuCalc_artefacts/Release/CLAP" staging/
          fi
          if [ -d "build/MuCalc_artefacts/Release/AU" ]; then
            cp -R "build/MuCalc_artefacts/Release/AU" staging/
          fi
          ls -la staging/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MuCalc-${{ runner.os }}
          path: staging/
          if-no-files-found: warn

  release:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package per platform
        run: |
          set -e
          mkdir -p release
          cd artifacts
          for d in */; do
            name="${d%/}"
            (cd "$d" && zip -r "../../release/${name}-${GITHUB_REF_NAME}.zip" .)
          done
          ls -la ../release/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
