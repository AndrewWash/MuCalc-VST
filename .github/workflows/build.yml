name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            generator: "Visual Studio 17 2022"
            arch_flag: "-A x64"
          - os: macos-latest
            generator: "Xcode"
            arch_flag: ""
          - os: ubuntu-latest
            generator: "Ninja"
            arch_flag: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ninja-build pkg-config \
            libasound2-dev libjack-jackd2-dev libcurl4-openssl-dev \
            libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev

      - name: Configure
        run: cmake -B build -G "${{ matrix.generator }}" ${{ matrix.arch_flag }} -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MuCalc-${{ runner.os }}
          path: |
            build/MuCalc_artefacts/Release/**/*.vst3
            build/MuCalc_artefacts/Release/**/*.clap
            build/MuCalc_artefacts/Release/**/*.component
          if-no-files-found: warn
